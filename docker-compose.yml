# Optional Docker Compose for local development
# Primary development uses local PHP/MySQL install (see README)
# Use this when you prefer a containerized environment

services:
  mysql:
    image: mysql:8.0
    container_name: visite_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: visite_technique
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: visite_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: visite_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data:
  redis_data:
